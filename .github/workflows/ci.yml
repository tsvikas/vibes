name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, develop]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OPENAI_API_KEY: MOCK_KEY_FOR_TESTING
  # Many color libraries just need this variable to be set to any value.
  # Set it to 3 to support 8-bit color graphics (256 colors per channel)
  # for libraries that care about the value set.
  FORCE_COLOR: 3

jobs:
  format-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: psf/black@c6755bb741b6481d6b3d3bb563c83fa060db96c9 # stable
        with:
          jupyter: false
          use_pyproject: true

  ruff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0

  prek:
    env:
      COLUMNS: 120
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: j178/prek-action@cbc2f23eb5539cf20d82d1aabd0d0ecbcc56f4e3 # v2

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          cache-suffix: mypy
      - name: Install packages
        run: >-
          uv sync
          --exact
          --all-extras
          --no-default-groups
          --group typing
          --group test
          --locked
      - name: List packages
        run: uv pip list
      - name: Run mypy
        run: uv run --no-sync mypy --num-workers "$(nproc)"

  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          cache-suffix: deps
      - name: Install packages
        run: >-
          uv sync
          --exact
          --all-extras
          --all-groups
          --locked
      - name: List packages
        run: uv pip list
      - name: Run deptry
        run: uv run --no-sync --with deptry -- deptry src/
      - name: Run pip-audit
        run: >-
          uv run --no-sync --with pip-audit -- pip-audit --skip-editable


  test:
    strategy:
      matrix:
        include:
          # test with highest resolution
          - resolution: highest
            os: ubuntu-latest
            python-version: '3.14'
          # test with lowest resolution
          - resolution: lowest
            os: ubuntu-latest
            python-version: '3.13'
          # test with different os
          - resolution: locked
            os: ubuntu-latest
            python-version: '3.13'
          - resolution: locked
            os: macos-latest
            python-version: '3.13'
          - resolution: locked
            os: windows-latest
            python-version: '3.13'
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: test-${{ matrix.python-version }}-${{ matrix.resolution }}-${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache-suffix: ${{ matrix.resolution }}
      - name: Install packages
        id: install_packages
        run: >-
          uv sync
          --exact
          --all-extras
          --no-default-groups
          --group test
          ${{ matrix.resolution == 'locked' && '--locked'
              || matrix.resolution == 'lowest' && '--upgrade --resolution lowest-direct'
              || matrix.resolution == 'highest' && '--upgrade --resolution highest'
              || '--NON_RECOGNIZED_RESOLUTION'
          }}
      - name: List packages
        run: uv pip list
      - name: Run tests
        id: run_tests
        run: >-
          uv run --no-sync --
          pytest
          --cov-branch
          --cov-report=term
          --cov-report=xml
          --junitxml=junit.xml
      - name: Upload test results to Codecov
        if: ${{ !cancelled() && steps.run_tests.conclusion != 'skipped' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}  # zizmor: ignore[secrets-outside-env]
          report_type: test_results
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}  # zizmor: ignore[secrets-outside-env]


  test-pypy-and-prerelease:
    strategy:
      matrix:
        include:
          # test on prerelease
          - resolution: prerelease
            os: ubuntu-latest
            python-version: '3.14'
          - resolution: prerelease
            os: ubuntu-latest
            python-version: '3.15'
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: test-${{ matrix.python-version }}-${{ matrix.resolution }}-${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache-suffix: ${{ matrix.resolution }}
      - name: Install packages
        id: install_packages
        run: >-
          uv sync
          --exact
          --all-extras
          --no-default-groups
          --group test
          ${{ matrix.resolution == 'locked' && '--locked'
              || matrix.resolution == 'lowest' && '--upgrade --resolution lowest-direct'
              || matrix.resolution == 'highest' && '--upgrade --resolution highest'
              || matrix.resolution == 'prerelease' && '--upgrade --resolution highest --prerelease allow'
              || '--NON_RECOGNIZED_RESOLUTION'
          }}
        continue-on-error: true
      - name: Stop job with warning if install fails
        if: ${{ steps.install_packages.outcome == 'failure' }}
        run: >-
          echo "::warning::Stopping job due to installation failure on Python ${{ matrix.python-version }}"
      - name: List packages
        if: ${{ steps.install_packages.outcome == 'success' }}
        run: uv pip list
      - name: Run tests
        if: ${{ steps.install_packages.outcome == 'success' }}
        run: uv run --no-sync -- pytest --cov-branch --cov-report=xml --junitxml=junit.xml

  pylint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          cache-suffix: pylint
      - name: Install packages
        run: >-
          uv sync
          --exact
          --all-extras
          --no-default-groups
          --locked
      - name: List packages
        run: uv pip list
      # use pylint exitcode to fail only on errors.
      - name: Run Pylint
        run: |
          set +e
          uv run --no-sync --with pylint -- pylint src --output-format=github
          result=$?
          set -e
          [ $((result & 1)) -ne 0 ] && echo "::error ::Pylint fatal(s) found"
          [ $((result & 2)) -ne 0 ] && echo "::error ::Pylint error(s) found"
          [ $((result & 4)) -ne 0 ] && echo "::warning ::Pylint warning(s) found"
          [ $((result & 8)) -ne 0 ] && echo "::warning ::Pylint refactor(s) found"
          [ $((result & 16)) -ne 0 ] && echo "::warning ::Pylint convention(s) found"
          [ $((result & 32)) -ne 0 ] && echo "::error ::Pylint usage error"
          exit $((result & 35))

  pass:
    if: ${{ always() }}
    needs:
      - format-python
      - ruff-check
      - prek
      - mypy
      - dependencies
      - test
      - test-pypy-and-prerelease
      - pylint
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
